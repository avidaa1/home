<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AVIDAA — Projects</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#07090c;
  --s1:#0d1117;
  --s2:#161b22;
  --s3:#21262d;
  --text:#e6edf3;
  --muted:#8b949e;
  --dim:#4a5568;
  --syne:'Syne',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --sans:'Outfit',sans-serif;
}
html{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;}
body{min-height:100vh;position:relative;overflow-x:hidden;}

/* dot grid */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(circle,rgba(255,255,255,.04) 1px,transparent 1px);
  background-size:28px 28px;
}

/* top glow */
body::after{
  content:'';position:fixed;top:-120px;left:50%;transform:translateX(-50%);
  width:600px;height:300px;
  background:radial-gradient(ellipse,rgba(45,212,191,.07) 0%,transparent 70%);
  z-index:0;pointer-events:none;
}

/* ── HEADER ── */
header{
  position:relative;z-index:10;
  border-bottom:1px solid var(--s3);
  background:rgba(7,9,12,.8);
  backdrop-filter:blur(16px);
}
.header-inner{
  max-width:1140px;margin:0 auto;
  padding:0 40px;
  display:flex;align-items:center;justify-content:space-between;
  height:60px;
}
.wordmark{
  font-family:var(--syne);font-size:20px;font-weight:800;
  color:var(--text);letter-spacing:.06em;
  text-decoration:none;display:flex;align-items:center;gap:10px;
}
.wordmark-dot{
  width:7px;height:7px;border-radius:50%;
  background:#2dd4bf;
  box-shadow:0 0 8px rgba(45,212,191,.6);
  animation:breathe 3s ease-in-out infinite;
}
@keyframes breathe{0%,100%{opacity:1;}50%{opacity:.4;}}
.header-meta{
  display:flex;align-items:center;gap:20px;
}
.sync-badge{
  font-family:var(--mono);font-size:11px;color:var(--muted);
  display:flex;align-items:center;gap:7px;
  padding:5px 12px;
  border:1px solid var(--s3);border-radius:20px;
  background:var(--s1);
}
.sync-dot{
  width:6px;height:6px;border-radius:50%;background:#22c55e;
  animation:breathe 2s ease-in-out infinite;
  flex-shrink:0;
}
.btn-ref{
  font-family:var(--mono);font-size:11px;
  background:none;border:1px solid var(--s3);
  color:var(--muted);border-radius:6px;
  padding:6px 12px;cursor:pointer;transition:.15s;
}
.btn-ref:hover{border-color:#2dd4bf;color:#2dd4bf;}

/* ── HERO ── */
.hero{
  position:relative;z-index:1;
  max-width:1140px;margin:0 auto;
  padding:64px 40px 52px;
  border-bottom:1px solid var(--s3);
}
.hero-eyebrow{
  font-family:var(--mono);font-size:11px;
  color:#2dd4bf;letter-spacing:.14em;text-transform:uppercase;
  margin-bottom:18px;
  display:flex;align-items:center;gap:10px;
}
.hero-eyebrow::before{
  content:'';display:block;width:24px;height:1px;background:#2dd4bf;
}
.hero-title{
  font-family:var(--syne);font-size:clamp(48px,7vw,88px);
  font-weight:800;line-height:.92;
  color:var(--text);letter-spacing:-.02em;
  margin-bottom:28px;
}
.hero-title span{
  display:block;color:transparent;
  -webkit-text-stroke:1px rgba(255,255,255,.18);
}
.hero-sub{
  font-size:15px;color:var(--muted);
  max-width:480px;line-height:1.7;
  margin-bottom:36px;
}
.hero-stats{
  display:flex;align-items:center;gap:0;
}
.stat{
  padding:0 24px;border-right:1px solid var(--s3);
  display:flex;flex-direction:column;gap:3px;
}
.stat:first-child{padding-left:0;}
.stat:last-child{border-right:none;}
.stat-val{
  font-family:var(--syne);font-size:22px;font-weight:700;
  color:var(--text);
}
.stat-label{
  font-family:var(--mono);font-size:10px;
  color:var(--muted);letter-spacing:.08em;text-transform:uppercase;
}

/* ── GRID ── */
.grid-wrap{
  position:relative;z-index:1;
  max-width:1140px;margin:0 auto;
  padding:44px 40px 80px;
}
.grid-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:28px;
}
.grid-label{
  font-family:var(--mono);font-size:11px;
  color:var(--dim);letter-spacing:.1em;text-transform:uppercase;
}
.synced-at{
  font-family:var(--mono);font-size:10px;color:var(--dim);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(330px,1fr));
  gap:1px;
  background:var(--s3);
  border:1px solid var(--s3);
  border-radius:12px;
  overflow:hidden;
}

/* ── CARD ── */
.card{
  background:color-mix(in srgb,var(--card-col,#2dd4bf) 5%,var(--s1));
  padding:28px 28px 24px;
  display:flex;flex-direction:column;gap:16px;
  cursor:default;
  position:relative;
  transition:background .15s;
  min-height:210px;
}
.card.has-live{cursor:pointer;}
.card:hover{background:color-mix(in srgb,var(--card-col,#2dd4bf) 10%,var(--s2));}
.card::before{
  content:'';
  position:absolute;left:0;top:0;bottom:0;width:4px;
  background:var(--card-col,#2dd4bf);
  opacity:.7;transition:opacity .2s;
}
.card:hover::before{opacity:1;}

.card-head{
  display:flex;align-items:flex-start;
  justify-content:space-between;gap:12px;
}
.card-head-left{display:flex;flex-direction:column;gap:8px;}
.card-name{
  font-family:var(--syne);font-size:17px;font-weight:700;
  color:var(--text);line-height:1;
}
.card-tags{display:flex;align-items:center;gap:6px;}
.tag{
  font-family:var(--mono);font-size:10px;
  letter-spacing:.08em;text-transform:uppercase;
  padding:3px 8px;border-radius:4px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--s3);
  color:var(--muted);
}
.tag.cat-tag{
  color:var(--card-col,#2dd4bf);
  background:rgba(45,212,191,.06);
  border-color:rgba(45,212,191,.15);
  border-color:color-mix(in srgb,var(--card-col) 25%,transparent);
  background:color-mix(in srgb,var(--card-col) 8%,transparent);
}
.lang-tag{border-color:var(--s3);}

.live-indicator{
  display:flex;align-items:center;gap:5px;
  flex-shrink:0;
}
.live-dot{
  width:6px;height:6px;border-radius:50%;
  background:#22c55e;
}
.live-text{
  font-family:var(--mono);font-size:10px;
  color:#22c55e;letter-spacing:.06em;
}
.offline-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--dim);
}

.card-desc{
  font-size:13px;color:var(--muted);
  line-height:1.65;flex:1;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;
  overflow:hidden;
}

.card-foot{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:14px;border-top:1px solid var(--s3);
  gap:10px;
}
.card-date{
  font-family:var(--mono);font-size:10px;color:var(--dim);
}
.card-actions{display:flex;gap:6px;}
.action{
  font-family:var(--mono);font-size:10px;
  text-decoration:none;
  padding:5px 10px;border-radius:5px;
  border:1px solid var(--s3);color:var(--muted);
  background:none;cursor:pointer;
  transition:all .12s;white-space:nowrap;
}
.action:hover{border-color:var(--muted);color:var(--text);}
.action.primary{
  color:var(--card-col,#2dd4bf);
  border-color:color-mix(in srgb,var(--card-col) 30%,transparent);
  background:color-mix(in srgb,var(--card-col) 6%,transparent);
}
.action.primary:hover{
  background:color-mix(in srgb,var(--card-col) 14%,transparent);
  border-color:var(--card-col,#2dd4bf);
}

/* skeleton */
.skel{
  background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);
  background-size:400% 100%;
  animation:shim 1.5s infinite;
  border-radius:3px;
}
@keyframes shim{0%{background-position:100% 0;}100%{background-position:-100% 0;}}

/* error */
.err{
  font-family:var(--mono);font-size:12px;
  color:#f87171;background:rgba(239,68,68,.08);
  border:1px solid rgba(239,68,68,.2);
  border-radius:8px;padding:12px 18px;
  margin-bottom:20px;display:none;
}

/* footer */
footer{
  position:relative;z-index:1;
  text-align:center;padding:28px 20px;
  border-top:1px solid var(--s3);
  font-family:var(--mono);font-size:11px;
  color:var(--dim);letter-spacing:.05em;
}
footer a{color:var(--muted);text-decoration:none;}
footer a:hover{color:#2dd4bf;}

/* card entrance */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
.card{animation:fadeUp .3s ease both;}

@media(max-width:700px){
  .header-inner{padding:0 20px;}
  .hero{padding:44px 20px 40px;}
  .hero-title{font-size:48px;}
  .grid-wrap{padding:32px 20px 60px;}
  .grid{grid-template-columns:1fr;}
  .stat{padding:0 16px;}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="wordmark" href="https://avidaa1.github.io/hub">
      <div class="wordmark-dot"></div>AVIDAA
    </a>
    <div class="header-meta">
      <div class="sync-badge">
        <div class="sync-dot"></div>
        <span id="countdown">live</span>
      </div>
      <button class="btn-ref" onclick="fetchRepos(true)">↻ sync</button>
    </div>
  </div>
</header>

<div class="hero">
  <div class="hero-eyebrow">Project Index</div>
  <h1 class="hero-title">
    All Repos<span>In One Place.</span>
  </h1>
  <p class="hero-sub">Every AVIDAA project — live status, last push, direct links. Auto-synced from GitHub every 5 minutes.</p>
  <div class="hero-stats">
    <div class="stat">
      <span class="stat-val" id="stat-repos">—</span>
      <span class="stat-label">Repos</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="stat-live">—</span>
      <span class="stat-label">Live</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="stat-sync">—</span>
      <span class="stat-label">Last sync</span>
    </div>
  </div>
</div>

<div class="grid-wrap">
  <div id="err" class="err"></div>
  <div class="grid-header">
    <span class="grid-label">Projects</span>
    <span class="synced-at" id="synced-at"></span>
  </div>
  <div class="grid" id="grid">
    <div class="card"><div class="skel" style="height:14px;width:55%;margin-bottom:10px;"></div><div class="skel" style="height:10px;width:30%;margin-bottom:16px;"></div><div class="skel" style="height:10px;width:100%;margin-bottom:6px;"></div><div class="skel" style="height:10px;width:70%;"></div></div>
    <div class="card"><div class="skel" style="height:14px;width:45%;margin-bottom:10px;"></div><div class="skel" style="height:10px;width:35%;margin-bottom:16px;"></div><div class="skel" style="height:10px;width:100%;margin-bottom:6px;"></div><div class="skel" style="height:10px;width:60%;"></div></div>
    <div class="card"><div class="skel" style="height:14px;width:50%;margin-bottom:10px;"></div><div class="skel" style="height:10px;width:28%;margin-bottom:16px;"></div><div class="skel" style="height:10px;width:100%;margin-bottom:6px;"></div><div class="skel" style="height:10px;width:80%;"></div></div>
  </div>
</div>

<footer>
  <a href="https://github.com/avidaa1" target="_blank">github.com/avidaa1</a>
  &nbsp;&middot;&nbsp;auto-synced &middot; no backend
</footer>

<script>
var USER='avidaa1';
var EXCLUDE=['home','avidaa1.github.io'];
var INTERVAL=5*60*1000;
var KNOWN={
  'hub':              {label:'Hub',        cat:'Platform', col:'#2dd4bf', live:'https://avidaa1.github.io/hub/',      order:1},
  'metaverse':        {label:'Metaverse',  cat:'Game',     col:'#f97316', live:'https://avidaa1.github.io/metaverse/',order:2},
  'ancestry':         {label:'Ancestry',   cat:'App',      col:'#a78bfa', live:'https://avidaa1.github.io/ancestry/', order:3},
  'suno':             {label:'Suno',       cat:'Music',    col:'#f472b6', live:'https://avidaa1.github.io/suno/',     order:4},
  'terra':            {label:'Terra',      cat:'Library',  col:'#22c55e', live:'https://avidaa1.github.io/terra/',    order:5},
  'entity':           {label:'Entity',     cat:'3D',       col:'#fbbf24', live:'https://avidaa1.github.io/entity/',   order:6},
  'celery':           {label:'Celery',     cat:'Page',     col:'#38bdf8', live:'https://avidaa1.github.io/celery/',   order:7},
  'bitcoin':          {label:'Bitcoin',    cat:'Finance',  col:'#f7931a', live:'https://avidaa1.github.io/bitcoin/',  order:8},
};
var _cd=INTERVAL/1000, _t=null, _ct=null;

async function fetchRepos(manual){
  if(manual){resetCd();}
  setErr('');
  try{
    var r=await fetch('https://api.github.com/users/'+USER+'/repos?per_page=100&sort=pushed',
      {headers:{'Accept':'application/vnd.github+json'}});
    if(r.status===403){
      var res=r.headers.get('X-RateLimit-Reset');
      setErr('GitHub rate limit.'+(res?' Resets '+new Date(res*1000).toLocaleTimeString():''));
      return;
    }
    if(!r.ok){setErr('API error '+r.status);return;}
    var data=await r.json();
    render(data);
    var now=new Date();
    document.getElementById('synced-at').textContent='synced '+now.toLocaleTimeString();
    document.getElementById('stat-sync').textContent=now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  }catch(e){setErr('Network: '+e.message);}
}

function render(repos){
  var list=repos.filter(function(r){return !r.fork && EXCLUDE.indexOf(r.name)===-1;});
  list.sort(function(a,b){
    var ao=(KNOWN[a.name]||{}).order||99,bo=(KNOWN[b.name]||{}).order||99;
    if(ao!==bo)return ao-bo;
    return new Date(b.pushed_at)-new Date(a.pushed_at);
  });
  var liveCount=list.filter(function(r){
    var k=KNOWN[r.name]||{};
    return k.live||r.has_pages;
  }).length;
  document.getElementById('stat-repos').textContent=list.length;
  document.getElementById('stat-live').textContent=liveCount;
  var html='';
  list.forEach(function(r,i){html+=card(r,i);});
  document.getElementById('grid').innerHTML=html;
}

function card(r,i){
  var k=KNOWN[r.name]||{};
  var label=k.label||cap(r.name);
  var cat=k.cat||'Other';
  var col=k.col||'#8b949e';
  var liveUrl=k.live||(r.has_pages?'https://'+USER+'.github.io/'+r.name+'/':null);
  var ghUrl='https://github.com/'+USER+'/'+r.name;
  var desc=r.description||'No description.';
  var date=ago(r.pushed_at);
  var lang=r.language||'';
  var delay=(i*0.04).toFixed(2);
  var liveHtml=liveUrl
    ?'<div class="live-indicator"><div class="live-dot"></div><span class="live-text">LIVE</span></div>'
    :'<div class="live-indicator"><div class="offline-dot"></div></div>';
  var actionLive=liveUrl?'<a class="action primary" href="'+esc(liveUrl)+'" target="_blank" onclick="event.stopPropagation()">↗ Live</a>':'';
  var cardClick=liveUrl?'onclick="window.open(\''+esc(liveUrl)+'\',\'_blank\')"':'';
  return '<div class="card'+(liveUrl?' has-live':'')+'" style="--card-col:'+col+';animation-delay:'+delay+'s" '+cardClick+'>'
    +'<div class="card-head">'
      +'<div class="card-head-left">'
        +'<div class="card-name">'+escHtml(label)+'</div>'
        +'<div class="card-tags">'
          +'<span class="tag cat-tag">'+escHtml(cat)+'</span>'
          +(lang?'<span class="tag lang-tag">'+escHtml(lang)+'</span>':'')
        +'</div>'
      +'</div>'
      +liveHtml
    +'</div>'
    +'<div class="card-desc">'+escHtml(desc)+'</div>'
    +'<div class="card-foot">'
      +'<span class="card-date">'+date+'</span>'
      +'<div class="card-actions">'
        +actionLive
        +'<a class="action" href="'+esc(ghUrl)+'" target="_blank" onclick="event.stopPropagation()">&lt;/&gt; Repo</a>'
      +'</div>'
    +'</div>'
  +'</div>';
}

function ago(iso){
  if(!iso)return'—';
  var s=Math.floor((Date.now()-new Date(iso))/1000);
  if(s<60)return s+'s ago';
  if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';
  if(s<2592000)return Math.floor(s/86400)+'d ago';
  return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1).replace(/-/g,' ');}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function esc(s){return s.replace(/'/g,'%27');}
function setErr(m){var e=document.getElementById('err');e.textContent=m;e.style.display=m?'block':'none';}

function startCd(){
  _cd=INTERVAL/1000;
  if(_ct)clearInterval(_ct);
  _ct=setInterval(function(){
    _cd--;
    var el=document.getElementById('countdown');
    if(_cd<=0)el.textContent='syncing…';
    else if(_cd<60)el.textContent=_cd+'s';
    else el.textContent=Math.ceil(_cd/60)+'m';
  },1000);
}
function resetCd(){
  clearInterval(_t);clearInterval(_ct);
  document.getElementById('countdown').textContent='live';
  startCd();
  _t=setInterval(function(){fetchRepos(false);startCd();},INTERVAL);
}

document.addEventListener('DOMContentLoaded',function(){
  fetchRepos(false);startCd();
  _t=setInterval(function(){fetchRepos(false);startCd();},INTERVAL);
});
</script>
</body>
</html>
