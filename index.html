<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AVIDAA</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --cyan:#00ffff;--purple:#aa44ff;--pink:#ff2d78;--gold:#ffd700;--green:#00ff88;
  --bg:#01030a;--card-bg:rgba(6,10,22,0.92);
  --font-d:'Orbitron',monospace;--font-b:'Rajdhani',sans-serif;
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:#c8d8f0;font-family:var(--font-b);overflow-x:hidden;cursor:none;}

/* CURSOR */
#cursor{position:fixed;width:8px;height:8px;background:var(--cyan);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen;box-shadow:0 0 10px var(--cyan),0 0 20px var(--cyan);}
#cursor-ring{position:fixed;width:32px;height:32px;border:1px solid rgba(0,255,255,.3);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .2s,height .2s,border-color .2s;}
body a:hover~#cursor-ring,body button:hover~#cursor-ring{width:48px;height:48px;border-color:var(--cyan);}

/* CANVAS LAYERS */
#galaxy{position:fixed;inset:0;z-index:0;}
#hex-canvas{position:fixed;inset:0;z-index:1;opacity:.35;pointer-events:none;}
#matrix-canvas{position:fixed;inset:0;z-index:2;opacity:0;pointer-events:none;transition:opacity .8s;}
#matrix-canvas.show{opacity:.22;}
#burst-canvas{position:fixed;inset:0;z-index:8;pointer-events:none;}
.veil{position:fixed;inset:0;z-index:3;background:radial-gradient(ellipse at 50% 50%,transparent 20%,rgba(1,3,10,.8)100%);}

/* PARTICLE TRAIL */
.trail-dot{position:fixed;border-radius:50%;pointer-events:none;z-index:9990;transform:translate(-50%,-50%);}

/* TOP BAR */
#topbar{position:fixed;top:0;left:0;right:0;z-index:25;height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(1,3,10,.7);border-bottom:1px solid rgba(0,255,255,.08);backdrop-filter:blur(12px);}
#topbar-left{display:flex;align-items:center;gap:16px;}
#topbar-logo{font-family:var(--font-d);font-size:11px;letter-spacing:6px;color:var(--cyan);text-shadow:0 0 12px var(--cyan);}
#mission-timer{font-family:var(--font-d);font-size:9px;letter-spacing:3px;color:rgba(0,255,255,.4);border:1px solid rgba(0,255,255,.12);padding:3px 10px;}
#topbar-right{display:flex;align-items:center;gap:10px;}
#matrix-btn{background:transparent;border:1px solid rgba(0,255,255,.15);color:rgba(0,255,100,.5);font-family:var(--font-d);font-size:8px;letter-spacing:3px;padding:5px 12px;cursor:pointer;transition:all .2s;}
#matrix-btn.active{border-color:#00ff64;color:#00ff64;box-shadow:0 0 10px rgba(0,255,100,.2);}
#radar-canvas{width:36px;height:36px;border:1px solid rgba(0,255,255,.15);border-radius:50%;cursor:pointer;}

/* HERO */
#hero{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px 80px;text-align:center;}

/* LOGO with scan animation */
.av-logo-wrap{position:relative;display:inline-block;margin-bottom:8px;}
.av-logo{font-family:var(--font-d);font-size:clamp(56px,13vw,130px);font-weight:900;letter-spacing:18px;line-height:1;background:linear-gradient(135deg,#fff 0%,var(--cyan) 35%,var(--purple) 75%,var(--pink) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:fadein .8s .1s ease both,logopulse 4s 1s ease-in-out infinite;}
@keyframes logopulse{0%,100%{filter:drop-shadow(0 0 20px rgba(0,255,255,.25));}50%{filter:drop-shadow(0 0 50px rgba(0,255,255,.5)) drop-shadow(0 0 80px rgba(170,68,255,.25));}}
.logo-scan{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);animation:scanline 3s 1.5s linear infinite;opacity:.6;}
@keyframes scanline{from{top:0;}to{top:100%;}}
@keyframes fadein{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}

.av-badge{font-family:var(--font-d);font-size:9px;letter-spacing:8px;color:rgba(0,255,255,.6);border:1px solid rgba(0,255,255,.15);padding:5px 18px;margin-bottom:28px;animation:fadein 1s ease both;position:relative;overflow:hidden;}
.av-badge::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(0,255,255,.1),transparent);animation:shimmer 3s 2s linear infinite;}
@keyframes shimmer{from{left:-100%;}to{left:200%;}}

.av-tagline{font-family:var(--font-d);font-size:clamp(9px,1.6vw,12px);letter-spacing:7px;color:rgba(200,216,240,.4);margin-top:14px;animation:fadein .8s .5s ease both;}

#typewriter{font-family:var(--font-b);font-size:clamp(14px,2.2vw,17px);color:rgba(180,210,240,.65);letter-spacing:1px;margin-top:22px;max-width:560px;line-height:1.75;min-height:2.6em;animation:fadein .8s .7s ease both;}
.tw-cursor{display:inline-block;width:2px;height:1.1em;background:var(--cyan);margin-left:3px;animation:blink .65s step-end infinite;vertical-align:middle;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* WORMHOLE */
#wormhole{position:absolute;width:200px;height:200px;pointer-events:none;opacity:.18;top:50%;left:50%;transform:translate(-50%,-50%) translateY(-90px);z-index:4;}

/* SCROLL HINT */
.scroll-hint{margin-top:52px;display:flex;flex-direction:column;align-items:center;gap:8px;animation:fadein .8s 1.6s ease both;}
.scroll-hint span{font-size:8px;letter-spacing:5px;color:rgba(0,255,255,.3);font-family:var(--font-d);}
.scroll-arrow{width:1px;height:40px;background:linear-gradient(to bottom,rgba(0,255,255,.5),transparent);animation:spulse 2.2s ease-in-out infinite;}
@keyframes spulse{0%,100%{opacity:.25;}50%{opacity:.9;}}

/* STATS */
#statbar{position:relative;z-index:10;display:flex;justify-content:center;margin-bottom:64px;padding:0 24px;}
.stat-item{text-align:center;padding:22px 44px;border:1px solid rgba(255,255,255,.05);background:rgba(6,10,22,.7);backdrop-filter:blur(10px);position:relative;overflow:hidden;}
.stat-item::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,255,255,.3),transparent);}
.stat-item+.stat-item{border-left:none;}
.stat-n{font-family:var(--font-d);font-size:clamp(24px,4vw,40px);font-weight:900;color:var(--cyan);text-shadow:0 0 20px rgba(0,255,255,.4);}
.stat-l{font-size:8px;letter-spacing:4px;color:rgba(200,216,240,.3);margin-top:5px;font-family:var(--font-d);}

/* PROJECTS */
#projects{position:relative;z-index:10;padding:60px 24px 140px;}
.sec-label{font-family:var(--font-d);font-size:9px;letter-spacing:9px;color:rgba(0,255,255,.35);text-align:center;margin-bottom:10px;}
.sec-title{font-family:var(--font-d);font-size:clamp(18px,4.5vw,36px);font-weight:900;letter-spacing:4px;text-align:center;color:#fff;margin-bottom:64px;}
.sec-title em{color:var(--cyan);font-style:normal;}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:18px;max-width:1240px;margin:0 auto;}

/* CARD — 3D tilt + holographic scan */
.pcard{background:var(--card-bg);border:1px solid rgba(255,255,255,.07);padding:26px 22px 20px;position:relative;overflow:hidden;cursor:pointer;text-decoration:none;display:block;backdrop-filter:blur(16px);transform-style:preserve-3d;transition:box-shadow .3s,border-color .3s;opacity:0;transform:translateY(24px);animation:cardIn .5s ease forwards;}
@keyframes cardIn{to{opacity:1;transform:translateY(0);}}
.pcard::after{content:'';position:absolute;top:-100%;left:0;right:0;height:60%;background:linear-gradient(180deg,rgba(255,255,255,.04),transparent);transform:skewY(-8deg);transition:top .4s ease;pointer-events:none;}
.pcard:hover::after{top:100%;}
.pcard:hover{border-color:var(--accent,var(--cyan));box-shadow:0 0 0 1px var(--accent,var(--cyan)) inset, 0 8px 48px var(--shadow,rgba(0,255,255,.15)), 0 0 80px rgba(0,0,0,.5);}

/* holographic scan on hover */
.pcard-holo{position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);pointer-events:none;transition:none;}
.pcard:hover .pcard-holo{left:150%;transition:left .6s ease;}

.pcard-strip{position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent,var(--cyan)),transparent);opacity:0;transition:opacity .3s;}
.pcard:hover .pcard-strip{opacity:1;}

/* corner glyph */
.pcard-corner{position:absolute;top:8px;right:10px;font-family:var(--font-d);font-size:7px;letter-spacing:2px;color:var(--accent,var(--cyan));opacity:.3;}

.pcard-icon{font-size:26px;margin-bottom:14px;display:block;}
.pcard-name{font-family:var(--font-d);font-size:12px;font-weight:900;letter-spacing:5px;color:#fff;margin-bottom:5px;}
.pcard-cat{font-size:8px;letter-spacing:4px;color:var(--accent,var(--cyan));opacity:.65;margin-bottom:13px;font-family:var(--font-d);}
.pcard-desc{font-size:13px;letter-spacing:.3px;color:rgba(180,210,240,.5);line-height:1.65;margin-bottom:18px;}
.pcard-footer{display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(255,255,255,.04);padding-top:12px;}
.pcard-url{font-family:var(--font-d);font-size:7px;letter-spacing:2px;color:rgba(180,210,240,.22);}
.pcard-pill{font-size:7px;letter-spacing:2px;padding:3px 9px;border:1px solid;font-family:var(--font-d);}
.pill-live{border-color:rgba(0,255,136,.4);color:var(--green);animation:livepulse 2s ease-in-out infinite;}
@keyframes livepulse{0%,100%{opacity:.7;}50%{opacity:1;}}
.pill-load{border-color:rgba(255,255,255,.08);color:rgba(255,255,255,.18);}
.pcard-arrow{position:absolute;bottom:20px;right:20px;font-size:14px;color:var(--accent,var(--cyan));opacity:0;transform:translate(4px,-4px);transition:all .25s;}
.pcard:hover .pcard-arrow{opacity:.6;transform:none;}

/* VISUALIZER */
#visualizer{position:fixed;bottom:42px;left:50%;transform:translateX(-50%);z-index:16;display:flex;align-items:flex-end;gap:2px;height:32px;pointer-events:none;}
.viz-bar{width:2px;border-radius:2px 2px 0 0;opacity:.4;}

/* TICKER */
#ticker{position:fixed;bottom:0;left:0;right:0;z-index:20;background:rgba(1,3,10,.8);border-top:1px solid rgba(0,255,255,.08);padding:5px 0;overflow:hidden;backdrop-filter:blur(8px);}
.ticker-inner{display:flex;white-space:nowrap;animation:tickscroll 55s linear infinite;}
.ticker-inner:hover{animation-play-state:paused;}
.tick-item{font-family:var(--font-d);font-size:8px;letter-spacing:3px;padding:0 28px;color:rgba(0,255,255,.35);}
.tick-item b{color:var(--cyan);}
@keyframes tickscroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}

/* CHATBOT */
#chatbot{position:fixed;bottom:48px;right:18px;z-index:30;width:320px;font-family:var(--font-b);}
#chat-toggle{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--cyan));border:2px solid rgba(255,255,255,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 24px rgba(170,68,255,.45),0 0 48px rgba(0,255,255,.15);margin-left:auto;transition:transform .2s,box-shadow .2s;animation:chatpulse 3s ease-in-out infinite;}
@keyframes chatpulse{0%,100%{box-shadow:0 0 24px rgba(170,68,255,.45);}50%{box-shadow:0 0 36px rgba(170,68,255,.7),0 0 60px rgba(0,255,255,.2);}}
#chat-toggle:hover{transform:scale(1.08);}
#chat-box{background:rgba(4,8,20,.96);border:1px solid rgba(0,255,255,.12);backdrop-filter:blur(20px);display:none;flex-direction:column;margin-bottom:10px;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,.8);}
#chat-box.open{display:flex;}
#chat-head{padding:12px 16px;border-bottom:1px solid rgba(0,255,255,.08);display:flex;justify-content:space-between;align-items:center;background:rgba(0,255,255,.03);}
.ch-title{font-family:var(--font-d);font-size:9px;letter-spacing:4px;color:var(--cyan);}
.ch-status{font-size:8px;letter-spacing:2px;color:var(--green);display:flex;align-items:center;gap:5px;}
.ch-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:livepulse 1.5s ease-in-out infinite;}
.ch-close{color:rgba(255,255,255,.25);cursor:pointer;font-size:16px;line-height:1;padding:0 2px;}
#chat-msgs{height:240px;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;scrollbar-width:thin;scrollbar-color:rgba(0,255,255,.15) transparent;}
.cmsg{font-size:12.5px;letter-spacing:.3px;line-height:1.55;padding:9px 13px;max-width:88%;position:relative;}
.cmsg.ai{background:rgba(0,255,255,.05);border-left:2px solid var(--cyan);color:#c8d8f0;align-self:flex-start;border-radius:0 4px 4px 0;}
.cmsg.ai::before{content:'AI';font-family:var(--font-d);font-size:6px;letter-spacing:2px;color:rgba(0,255,255,.4);display:block;margin-bottom:4px;}
.cmsg.user{background:rgba(170,68,255,.07);border-right:2px solid var(--purple);color:#c8d8f0;align-self:flex-end;text-align:right;border-radius:4px 0 0 4px;}
.typing-indicator{display:flex;gap:4px;padding:10px 14px;align-self:flex-start;}
.typing-indicator span{width:5px;height:5px;background:var(--cyan);border-radius:50%;opacity:.4;animation:typedot .8s ease-in-out infinite;}
.typing-indicator span:nth-child(2){animation-delay:.15s;}
.typing-indicator span:nth-child(3){animation-delay:.3s;}
@keyframes typedot{0%,100%{opacity:.2;transform:translateY(0);}50%{opacity:1;transform:translateY(-4px);}}
#chat-suggestions{display:flex;flex-wrap:wrap;gap:5px;padding:8px 14px;border-top:1px solid rgba(0,255,255,.05);}
.chat-sugg{font-size:10px;letter-spacing:.5px;padding:3px 10px;border:1px solid rgba(0,255,255,.15);color:rgba(0,255,255,.5);cursor:pointer;background:rgba(0,255,255,.03);transition:all .2s;}
.chat-sugg:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,255,255,.06);}
#chat-input-row{display:flex;border-top:1px solid rgba(0,255,255,.07);}
#chat-input{flex:1;background:transparent;border:none;outline:none;color:#c8d8f0;font-family:var(--font-b);font-size:13px;padding:11px 14px;letter-spacing:.3px;}
#chat-input::placeholder{color:rgba(200,216,240,.2);}
#chat-send{background:transparent;border:none;border-left:1px solid rgba(0,255,255,.07);color:var(--cyan);padding:0 16px;cursor:pointer;font-size:15px;transition:color .2s;}
#chat-send:hover{color:#fff;}

/* WARP */
#warp{position:fixed;inset:0;z-index:500;pointer-events:none;opacity:0;background:radial-gradient(ellipse at center,rgba(255,255,255,.9) 0%,var(--cyan) 15%,var(--purple) 40%,transparent 75%);transition:opacity .3s;}
#warp.on{opacity:1;}
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>

<canvas id="galaxy"></canvas>
<canvas id="hex-canvas"></canvas>
<canvas id="matrix-canvas"></canvas>
<canvas id="burst-canvas"></canvas>
<div class="veil"></div>

<!-- TOP BAR -->
<div id="topbar">
  <div id="topbar-left">
    <div id="topbar-logo">AVIDAA</div>
    <div id="mission-timer">T+ 00:00:00</div>
  </div>
  <div id="topbar-right">
    <button id="matrix-btn" onclick="toggleMatrix()">MATRIX</button>
    <canvas id="radar-canvas" width="36" height="36" title="AVIDAA RADAR"></canvas>
  </div>
</div>

<!-- VISUALIZER -->
<div id="visualizer"></div>

<!-- TICKER -->
<div id="ticker"><div class="ticker-inner" id="tickInner"></div></div>

<!-- HERO -->
<section id="hero">
  <div id="wormhole"></div>
  <div class="av-badge">DIGITAL UNIVERSE &nbsp;&middot;&nbsp; EST. 2025</div>
  <div class="av-logo-wrap">
    <div class="av-logo">AVIDAA</div>
    <div class="logo-scan"></div>
  </div>
  <div class="av-tagline">KNOWLEDGE &nbsp;&middot;&nbsp; TECHNOLOGY &nbsp;&middot;&nbsp; FREEDOM</div>
  <div id="typewriter"><span class="tw-cursor"></span></div>
  <div class="scroll-hint"><span>EXPLORE</span><div class="scroll-arrow"></div></div>
</section>

<!-- STATS -->
<div id="statbar">
  <div class="stat-item"><div class="stat-n" id="s-repos">12</div><div class="stat-l">PROJECTS</div></div>
  <div class="stat-item"><div class="stat-n" id="s-live">&#8212;</div><div class="stat-l">LIVE</div></div>
  <div class="stat-item"><div class="stat-n" id="s-sync">&#8212;</div><div class="stat-l">LAST SYNC</div></div>
</div>

<!-- PROJECTS -->
<section id="projects">
  <div class="sec-label">AVIDAA ECOSYSTEM</div>
  <div class="sec-title">All Projects. <em>One Universe.</em></div>
  <div class="proj-grid" id="projGrid"></div>
</section>

<!-- CHATBOT -->
<div id="chatbot">
  <div id="chat-box">
    <div id="chat-head">
      <div>
        <div class="ch-title">AVIDAA AI</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="ch-status"><div class="ch-dot"></div>ONLINE</div>
        <div class="ch-close" onclick="toggleChat()">&#x2715;</div>
      </div>
    </div>
    <div id="chat-msgs"></div>
    <div id="chat-suggestions">
      <div class="chat-sugg" onclick="quickAsk('What is AVIDAA?')">What is AVIDAA?</div>
      <div class="chat-sugg" onclick="quickAsk('Show me all projects')">All projects</div>
      <div class="chat-sugg" onclick="quickAsk('Tell me about the metaverse')">Metaverse</div>
      <div class="chat-sugg" onclick="quickAsk('What can kids do here?')">Kids</div>
    </div>
    <div id="chat-input-row">
      <input id="chat-input" placeholder="Ask about AVIDAA..." maxlength="200">
      <button id="chat-send" onclick="chatSend()">&#x27A4;</button>
    </div>
  </div>
  <button id="chat-toggle" onclick="toggleChat()">&#x1F916;</button>
</div>

<div id="warp"></div>

<script>

const gc=document.getElementById('galaxy'),gx=gc.getContext('2d');
let W,H,stars=[],shooters=[],moon,blackhole,nebula=[],planets=[],constellLines=[];
function resize(){W=gc.width=window.innerWidth;H=gc.height=window.innerHeight;initScene();}
function initScene(){
  stars=Array.from({length:380},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.8+.3,a:Math.random(),da:(Math.random()-.5)*.006,vy:Math.random()*.1+.03}));
  nebula=Array.from({length:8},()=>({x:Math.random()*W,y:Math.random()*H,rx:140+Math.random()*220,ry:100+Math.random()*160,hue:[200,265,305,185,345,215,295,175][Math.floor(Math.random()*8)],al:.012+Math.random()*.02}));
  moon={cx:W*.5,cy:H*.42,orbitR:Math.min(W,H)*.27,angle:Math.PI*.3,speed:.00035,r:13};
  blackhole={x:W*.5,y:H*.58,r:38,angle:0};
  planets=[
    {cx:W*.5,cy:H*.52,orbitR:Math.min(W,H)*.36,angle:Math.PI*.7,speed:.00016,r:7,color:'#aa44ff',name:'NEXUS'},
    {cx:W*.5,cy:H*.52,orbitR:Math.min(W,H)*.5,angle:Math.PI*1.3,speed:.0001,r:5,color:'#ffd700',name:'SOL'},
    {cx:W*.5,cy:H*.52,orbitR:Math.min(W,H)*.17,angle:0,speed:.0003,r:3,color:'#00ffaa',name:'CORE'},
  ];
  constellLines=[];
  const sample=stars.filter((_,i)=>i%3===0);
  for(let i=0;i<sample.length;i++)for(let j=i+1;j<sample.length;j++){
    const dx=sample[i].x-sample[j].x,dy=sample[i].y-sample[j].y;
    if(Math.sqrt(dx*dx+dy*dy)<80&&Math.random()<.06)constellLines.push([sample[i],sample[j]]);
  }
}
setInterval(()=>{
  const e=Math.random()<.5;const x=e?W:0,y=Math.random()*H*.75;
  const a=e?Math.PI*.86+Math.random()*.28:-.08+Math.random()*.28;
  shooters.push({x,y,vx:Math.cos(a)*13*(e?-1:1),vy:Math.sin(a)*11+2,a:1,col:Math.random()<.3?'purple':'cyan'});
},1700);

function drawGalaxy(){
  gx.clearRect(0,0,W,H);
  const gr=gx.createRadialGradient(W*.5,H*.45,0,W*.5,H*.45,Math.max(W,H)*.72);
  gr.addColorStop(0,'rgba(6,3,26,.92)');gr.addColorStop(.5,'rgba(1,3,12,.94)');gr.addColorStop(1,'rgba(0,0,3,1)');
  gx.fillStyle=gr;gx.fillRect(0,0,W,H);
  nebula.forEach(n=>{
    const sc=n.rx/Math.max(n.rx,n.ry),sy=n.ry/Math.max(n.rx,n.ry);
    const ng=gx.createRadialGradient(n.x/sc,n.y/sy,0,n.x/sc,n.y/sy,Math.max(n.rx,n.ry));
    ng.addColorStop(0,`hsla(${n.hue},100%,60%,${n.al})`);ng.addColorStop(1,'transparent');
    gx.save();gx.scale(sc,sy);gx.fillStyle=ng;
    gx.beginPath();gx.arc(n.x/sc,n.y/sy,Math.max(n.rx,n.ry),0,Math.PI*2);gx.fill();gx.restore();
  });
  gx.strokeStyle='rgba(0,255,255,.03)';gx.lineWidth=.4;
  constellLines.forEach(([a,b])=>{gx.beginPath();gx.moveTo(a.x,a.y);gx.lineTo(b.x,b.y);gx.stroke();});
  stars.forEach(s=>{
    s.a+=s.da;if(s.a>1||s.a<0)s.da*=-1;s.y+=s.vy;if(s.y>H){s.y=0;s.x=Math.random()*W;}
    gx.save();gx.globalAlpha=Math.max(0,Math.min(1,s.a));gx.fillStyle='#fff';
    if(s.r>1.4){gx.shadowBlur=5;gx.shadowColor='#aaddff';}
    gx.beginPath();gx.arc(s.x,s.y,s.r,0,Math.PI*2);gx.fill();gx.restore();
  });
  shooters.forEach((ss,i)=>{
    ss.x+=ss.vx;ss.y+=ss.vy;ss.a-=.019;
    const rgb=ss.col==='purple'?'170,68,255':'0,255,255';
    const sg=gx.createLinearGradient(ss.x,ss.y,ss.x-ss.vx*4,ss.y-ss.vy*3);
    sg.addColorStop(0,`rgba(${rgb},${Math.max(0,ss.a).toFixed(3)})`);sg.addColorStop(1,'rgba(0,0,0,0)');
    gx.save();gx.strokeStyle=sg;gx.lineWidth=1.5;gx.shadowBlur=8;gx.shadowColor=ss.col==='purple'?'#aa44ff':'#00ffff';
    gx.beginPath();gx.moveTo(ss.x,ss.y);gx.lineTo(ss.x-ss.vx*4,ss.y-ss.vy*3);gx.stroke();gx.restore();
    if(ss.a<=0)shooters.splice(i,1);
  });
  blackhole.angle+=.004;
  const bx=blackhole.x,by=blackhole.y,br=blackhole.r;
  for(let i=3;i>0;i--){
    const dg=gx.createRadialGradient(bx,by,br*i*.35,bx,by,br*(i+1)*.75);
    dg.addColorStop(0,`rgba(170,68,255,${.08/i})`);dg.addColorStop(.5,`rgba(0,255,255,${.05/i})`);dg.addColorStop(1,'transparent');
    gx.save();gx.scale(1,.26);gx.rotate(blackhole.angle*.25);gx.translate(bx,by/.26);
    gx.fillStyle=dg;gx.beginPath();gx.arc(0,0,br*(i+1)*.75,0,Math.PI*2);gx.fill();gx.restore();
  }
  const bc=gx.createRadialGradient(bx,by,0,bx,by,br);
  bc.addColorStop(0,'rgba(0,0,0,1)');bc.addColorStop(.6,'rgba(6,0,18,.97)');bc.addColorStop(1,'transparent');
  gx.fillStyle=bc;gx.beginPath();gx.arc(bx,by,br*1.3,0,Math.PI*2);gx.fill();
  planets.forEach(p=>{
    p.angle+=p.speed;
    const px=p.cx+Math.cos(p.angle)*p.orbitR,py=p.cy+Math.sin(p.angle)*p.orbitR*.34;
    gx.save();gx.strokeStyle='rgba(255,255,255,.03)';gx.lineWidth=.4;
    gx.scale(1,.34);gx.beginPath();gx.arc(p.cx,p.cy/.34,p.orbitR,0,Math.PI*2);gx.stroke();gx.restore();
    const pg=gx.createRadialGradient(px,py,0,px,py,p.r*3.5);
    pg.addColorStop(0,p.color+'bb');pg.addColorStop(1,'transparent');
    gx.fillStyle=pg;gx.beginPath();gx.arc(px,py,p.r*3.5,0,Math.PI*2);gx.fill();
    gx.fillStyle=p.color;gx.beginPath();gx.arc(px,py,p.r,0,Math.PI*2);gx.fill();
  });
  moon.angle+=moon.speed;
  const mxp=moon.cx+Math.cos(moon.angle)*moon.orbitR,myp=moon.cy+Math.sin(moon.angle)*moon.orbitR*.27;
  gx.save();gx.strokeStyle='rgba(255,255,255,.03)';gx.lineWidth=.4;
  gx.scale(1,.27);gx.beginPath();gx.arc(moon.cx,moon.cy/.27,moon.orbitR,0,Math.PI*2);gx.stroke();gx.restore();
  const mg=gx.createRadialGradient(mxp,myp,0,mxp,myp,30);
  mg.addColorStop(0,'rgba(210,235,255,.14)');mg.addColorStop(1,'transparent');
  gx.fillStyle=mg;gx.beginPath();gx.arc(mxp,myp,30,0,Math.PI*2);gx.fill();
  const mb=gx.createRadialGradient(mxp-3,myp-3,1,mxp,myp,moon.r);
  mb.addColorStop(0,'#e8f0ff');mb.addColorStop(.6,'#b0c0e0');mb.addColorStop(1,'#5868a0');
  gx.fillStyle=mb;gx.beginPath();gx.arc(mxp,myp,moon.r,0,Math.PI*2);gx.fill();
  requestAnimationFrame(drawGalaxy);
}
window.addEventListener('resize',resize);resize();drawGalaxy();

const hc=document.getElementById('hex-canvas'),hx2=hc.getContext('2d');
function resizeHex(){hc.width=window.innerWidth;hc.height=window.innerHeight;}
resizeHex();window.addEventListener('resize',resizeHex);
let hexT=0;
function drawHex(){
  hx2.clearRect(0,0,hc.width,hc.height);
  const size=38,w=size*2,h=Math.sqrt(3)*size;
  hx2.lineWidth=.4;
  for(let row=-1;row<hc.height/h+2;row++){
    for(let col=-1;col<hc.width/w*1.5+2;col++){
      const x=col*w*.75,y=row*h+(col%2?h*.5:0);
      const dist=Math.sqrt((x-hc.width*.5)**2+(y-hc.height*.5)**2);
      const wave=Math.sin(dist*.012-hexT)*.5+.5;
      hx2.strokeStyle=`rgba(0,255,255,${.02+wave*.06})`;
      hx2.beginPath();
      for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/6;hx2.lineTo(x+size*Math.cos(a),y+size*Math.sin(a));}
      hx2.closePath();hx2.stroke();
    }
  }
  hexT+=.018;requestAnimationFrame(drawHex);
}
drawHex();

const rc=document.getElementById('radar-canvas'),rx=rc.getContext('2d');
let radarAngle=0;
const rDots=Array.from({length:6},()=>({a:Math.random()*Math.PI*2,r:8+Math.random()*12,life:0}));
function drawRadar(){
  rx.clearRect(0,0,36,36);
  const cx=18,cy=18,R=16;
  [.33,.66,1].forEach(f=>{
    rx.strokeStyle=`rgba(0,255,255,${.07+f*.05})`;rx.lineWidth=.5;
    rx.beginPath();rx.arc(cx,cy,R*f,0,Math.PI*2);rx.stroke();
  });
  rx.strokeStyle='rgba(0,255,255,.06)';rx.lineWidth=.4;
  rx.beginPath();rx.moveTo(cx-R,cy);rx.lineTo(cx+R,cy);rx.moveTo(cx,cy-R);rx.lineTo(cx,cy+R);rx.stroke();
  // sweep using manual arc fill instead of createConicGradient for compatibility
  rx.save();
  rx.beginPath();rx.moveTo(cx,cy);rx.arc(cx,cy,R,radarAngle-1.1,radarAngle);rx.closePath();
  rx.fillStyle='rgba(0,255,255,.12)';rx.fill();
  rx.restore();
  rx.strokeStyle='rgba(0,255,255,.7)';rx.lineWidth=1;
  rx.beginPath();rx.moveTo(cx,cy);rx.lineTo(cx+Math.cos(radarAngle)*R,cy+Math.sin(radarAngle)*R);rx.stroke();
  rDots.forEach(d=>{
    d.life=Math.max(0,d.life-.015);
    const diff=((d.a-radarAngle)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
    if(diff<.14)d.life=1;
    if(d.life>0){
      rx.fillStyle=`rgba(0,255,136,${d.life})`;
      rx.beginPath();rx.arc(cx+Math.cos(d.a)*d.r,cy+Math.sin(d.a)*d.r,1.8,0,Math.PI*2);rx.fill();
    }
  });
  radarAngle+=.045;requestAnimationFrame(drawRadar);
}
drawRadar();

  rxPos+=(mxPos-rxPos)*.1;ryPos+=(myPos-ryPos)*.1;

  trail.forEach(t=>{

function chatMatch(msg){
  const low=msg.toLowerCase();
  let best=null,bestScore=0;
  KB.forEach(e=>{
    let sc=0;e.k.forEach(k=>{if(low.includes(k))sc+=k.split(' ').length*k.length;});
    if(sc>bestScore){bestScore=sc;best=e;}
  });
  if(best&&bestScore>0){
    const r=best.r[Math.floor(Math.random()*best.r.length)];
    return {text:r,link:best.link||null};
  }
  return {text:'I am CH4T1 — the AI within AVIDAA. Ask me about any project, about IO, about CH4T1, or about the philosophy. The signal is open.',link:null};
}
function addMsg(text,cls,link){
  const div=document.createElement('div');
  div.className='cmsg '+cls;
  div.textContent=text;
  if(link){
    const a=document.createElement('a');
    a.href=link;a.target='_blank';a.rel='noopener';
    a.style.cssText='display:block;margin-top:7px;font-size:10px;letter-spacing:2px;color:rgba(0,255,255,.6);text-decoration:none;border-top:1px solid rgba(0,255,255,.1);padding-top:6px;';
    a.textContent='OPEN PROJECT ↗';div.appendChild(a);
  }
  document.getElementById('chat-msgs').appendChild(div);
  document.getElementById('chat-msgs').scrollTop=9999;
}
function showTyping(){
  const t=document.createElement('div');t.className='typing-indicator';t.id='typing';
  t.innerHTML='<span></span><span></span><span></span>';
  document.getElementById('chat-msgs').appendChild(t);
  document.getElementById('chat-msgs').scrollTop=9999;
  return t;
}
let chatOpen=false;
function toggleChat(){
  chatOpen=!chatOpen;
  document.getElementById('chat-box').classList.toggle('open',chatOpen);
  if(chatOpen&&document.getElementById('chat-msgs').children.length===0){
    setTimeout(()=>addMsg('AVIDAA AI online — 12 projects, 1 universe. What do you want to explore?','ai'),350);
  }
  if(chatOpen)document.getElementById('chat-input').focus();
}
function chatSend(){
  const inp=document.getElementById('chat-input');
  const msg=inp.value.trim();if(!msg)return;
  addMsg(msg,'user');inp.value='';
  const typing=showTyping();
  const delay=380+Math.random()*340;
  setTimeout(()=>{
    typing.remove();
    const res=chatMatch(msg);
    addMsg(res.text,'ai',res.link);
  },delay);
}
function quickAsk(q){document.getElementById('chat-input').value=q;chatSend();}
document.getElementById('chat-input').addEventListener('keydown',e=>{if(e.key==='Enter')chatSend();});

// ===================== CARDS =====================
function renderCards(ghData){
  const grid=document.getElementById('projGrid');
  grid.innerHTML='';let live=0;
  REPOS.forEach((r,idx)=>{
    const gh=ghData[r.name]||{};const isLive=!!gh.pushed_at;if(isLive)live++;
    const pushed=gh.pushed_at?timeAgo(gh.pushed_at):'—';
    const a=document.createElement('a');
    a.className='pcard';a.href=r.url;a.target='_blank';a.rel='noopener';
    a.style.setProperty('--accent',r.accent);a.style.setProperty('--shadow',r.shadow);a.style.setProperty('--glow-color',r.glow);
    a.style.animationDelay=(idx*55)+'ms';
    a.innerHTML=`<div class="pcard-strip"></div>
      <div class="pcard-holo"></div>
      <div class="pcard-corner">SYS-${String(idx+1).padStart(2,'0')}</div>
      <span class="pcard-icon">${r.icon}</span>
      <div class="pcard-name">${r.name.toUpperCase()}</div>
      <div class="pcard-cat">${r.cat}</div>
      <div class="pcard-desc">${r.desc}</div>
      <div class="pcard-footer">
        <span class="pcard-url">${r.url.replace('https://','')}</span>
        <span class="pcard-pill ${isLive?'pill-live':'pill-load'}">${isLive?'LIVE':'SYNC'}</span>
      </div>
      <div class="pcard-arrow">&#x2197;</div>`;
    // 3D tilt
    a.addEventListener('mousemove',e=>{
      const rect=a.getBoundingClientRect();
      const tx=((e.clientX-rect.left)/rect.width-.5)*10;
      const ty=((e.clientY-rect.top)/rect.height-.5)*-8;
      a.style.transform=`perspective(600px) rotateX(${ty}deg) rotateY(${tx}deg) translateY(-4px)`;
    });
    a.addEventListener('mouseleave',()=>{a.style.transform='';});
    a.addEventListener('click',()=>{const w=document.getElementById('warp');w.classList.add('on');setTimeout(()=>w.classList.remove('on'),350);});
    grid.appendChild(a);
  });
  document.getElementById('s-live').textContent=live;
  lastSyncTime=Date.now();document.getElementById('s-sync').textContent='just now';
}

// ===================== GITHUB SYNC =====================
let lastSyncTime=0;
function timeAgo(iso){
  const s=Math.floor((Date.now()-new Date(iso))/1000);
  if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';
}
async function syncAll(){
  const data={};
  await Promise.all(REPOS.map(async r=>{
    try{const res=await fetch('https://api.github.com/repos/avidaa1/'+r.name,{headers:{Accept:'application/vnd.github+json'}});
    if(res.ok)data[r.name]=await res.json();}catch(e){}
  }));
  renderCards(data);
}
syncAll();setInterval(syncAll,300000);
setInterval(()=>{
  if(!lastSyncTime)return;
  const s=Math.floor((Date.now()-lastSyncTime)/1000);
  const el=document.getElementById('s-sync');
  if(s<10)el.textContent='just now';
  else if(s<60)el.textContent=s+'s ago';
  else el.textContent=Math.floor(s/60)+'m ago';
},5000);
